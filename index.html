<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dim — Night Light</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=Spectral:ital,wght@0,400;0,600;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css?v=20260318g" />
  </head>
  <body>
    <main id="lamp" class="lamp" aria-label="Colored night light">
      <div class="glow"></div>
      <div id="tapCatcher" class="tap-catcher" aria-hidden="true"></div>
      <canvas id="starfield" class="starfield" aria-hidden="true"></canvas>
      <header class="brand" aria-label="Dim night light">
        <div class="logo">Dim</div>
      </header>

      <section class="controls" aria-label="Light controls">
        <div class="control-row">
          <div>
            <div class="label sr-only">Color</div>
            <div class="palette" role="list"></div>
          </div>
        </div>

        <div class="control-row">
          <div class="slider-group">
            <div class="label sr-only">Brightness</div>
            <input
              id="brightness"
              type="range"
              min="10"
              max="100"
              value="70"
              aria-label="Brightness"
            />
          </div>

          <div class="toggles">
            <button id="nightVision" class="toggle" type="button">Night Vision</button>
            <button id="boost" class="toggle" type="button">Boost</button>
            <button id="galaxy" class="toggle" type="button">Galaxy</button>
            <button id="music" class="toggle" type="button">Sound</button>
            <button id="wakeLock" class="toggle" type="button">Keep On</button>
            <button id="quickLight" class="toggle" type="button">Quick</button>
            <button id="installApp" class="toggle ghost" type="button">Add</button>
          </div>
        </div>

        <div id="soundOptions" class="sound-options" aria-label="Sound presets">
          <button class="sound-option" data-sound="hearth" type="button">Hearth</button>
          <button class="sound-option" data-sound="arcane" type="button">Arcane</button>
          <button class="sound-option" data-sound="nocturne" type="button">Nocturne</button>
          <button class="sound-option" data-sound="piano" type="button">Piano</button>
          <button class="sound-option" data-sound="haven" type="button">Haven</button>
        </div>

        <div class="hints" id="status" aria-live="polite"></div>
      </section>
    </main>

    <div class="tap-hint" id="tapHint">Tap to show controls</div>

    <div id="installModal" class="modal" aria-hidden="true">
      <div class="modal-card" role="dialog" aria-modal="true">
        <div class="modal-title">Add Dim to Your Home Screen</div>
        <div class="modal-body" id="installText"></div>
        <button id="closeModal" class="toggle" type="button">Got it</button>
      </div>
    </div>

    <script src="app.js?v=20260318g"></script>
  </body>
</html>
